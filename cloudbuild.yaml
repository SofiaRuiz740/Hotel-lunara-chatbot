substitutions:
  _REGION: us-central1
  _SERVICE: hotel-lunara-backend
  _REPOSITORY: apps
  _CLOUDSQL_INSTANCE: hotel-lunara:us-central1:lunara-db

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/apps/hotel-lunara-backend:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/apps/hotel-lunara-backend:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hotel-lunara-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/apps/hotel-lunara-backend:$COMMIT_SHA
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --add-cloudsql-instances=hotel-lunara:us-central1:lunara-db
      - --set-env-vars=SPRING_PROFILES_ACTIVE=prod,OPENAI_MODEL=gpt-4o-mini,SPRING_DATASOURCE_URL=jdbc:postgresql:///hoteldb?cloudSqlInstance=hotel-lunara:us-central1:lunara-db&socketFactory=com.google.cloud.sql.postgres.SocketFactory,SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect,SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - --set-secrets=SPRING_DATASOURCE_USERNAME=DB_USER:latest,SPRING_DATASOURCE_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,CORS_ALLOWED_ORIGINS=CORS_ALLOWED_ORIGINS:latest,JWT_EXPIRATION=JWT_EXPIRATION:latest,JWT_REFRESH_EXPIRATION=JWT_REFRESH_EXPIRATION:latest

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/apps/hotel-lunara-backend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY