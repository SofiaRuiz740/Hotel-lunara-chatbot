server:
  port: ${PORT:8080}

spring:
  application:
    name: hotel-lunara
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hotel_lunara}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mvc:
    problemdetails:
      enabled: false

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html

app:
  ai:
    provider: ${AI_PROVIDER:auto}
  time-zone: ${APP_TIME_ZONE:UTC}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: https://api.openai.com/v1/chat/completions

  ollama:
    model: ${OLLAMA_MODEL:llama3.2}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434/api/chat}
    preflight-timeout-ms: ${OLLAMA_PREFLIGHT_TIMEOUT_MS:800}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

  hotel:
    name: Hotel Lunara
    stars: 4
    floors: 8
    total-rooms: 60
    description: Hotel Lunara es un hotel mediano de categoria superior con enfoque en hospitalidad, confort y operacion moderna.
    address: Av. Principal 123, Ciudad
    phone: +1 (555) 123-4567
    email: info@hotellunara.com
    check-in-time: "15:00"
    check-out-time: "12:00"
    cancellation-policy: Cancelacion gratuita con mas de 48 horas de anticipacion.
    images: https://images.unsplash.com/photo-1566073771259-6a8506099945,https://images.unsplash.com/photo-1551882547-ff40c63fe5fa,https://images.unsplash.com/photo-1522798514-97ceb8c4f1c8

  policy:
    room-cancellation-hours: ${ROOM_CANCELLATION_HOURS:48}
    restaurant-cancellation-hours: ${RESTAURANT_CANCELLATION_HOURS:2}
    restaurant:
      breakfast-start: ${RESTAURANT_BREAKFAST_START:07:00}
      breakfast-end: ${RESTAURANT_BREAKFAST_END:10:30}
      lunch-start: ${RESTAURANT_LUNCH_START:12:30}
      lunch-end: ${RESTAURANT_LUNCH_END:15:00}
      dinner-start: ${RESTAURANT_DINNER_START:19:00}
      dinner-end: ${RESTAURANT_DINNER_END:23:00}

  security:
    concierge:
      rate-limit:
        window-seconds: ${CONCIERGE_RATE_WINDOW_SECONDS:60}
        max-requests: ${CONCIERGE_RATE_MAX_REQUESTS:20}

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotel_lunara}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false