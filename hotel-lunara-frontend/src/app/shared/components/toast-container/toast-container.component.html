<div class="toast-stack">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast-card" [ngClass]="toast.type">
      <span class="toast-card__indicator"></span>
      <div class="toast-card__content">
        <strong>{{ toast.type | titlecase }}</strong>
        <p>{{ toast.message }}</p>
      </div>
      <button type="button" (click)="toastService.dismiss(toast.id)" aria-label="Cerrar notificacion">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  }
</div>
